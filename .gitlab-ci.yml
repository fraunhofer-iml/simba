variables:
  CRI_URL: $CI_REGISTRY
  CRI_PATH: ${CRI_URL}/skala/ap3/core

stages:
  - danger
  - test
  - analysis
  - build
  - archive
  - deploy

.default:
  image: imbios/bun-node:1.1.26-22-alpine
  interruptible: true
  cache:
    key:
      files:
        - bun.lockb
    paths:
      - .bun/
  before_script:
    - bun install --frozen-lockfile

danger:
  stage: danger
  extends: .default
  script:
    - bun install -g danger
    - danger ci --failOnErrors
  allow_failure: true
  only:
    - merge_requests

include:
  - 'apps/bff/.gitlab-ci.yml'
  - 'apps/frontend/.gitlab-ci.yml'

all:deploy:
  stage: deploy
  image: alpine:latest
  variables:
    GIT_STRATEGY: none
  before_script:
    - echo "Deploying images with tag $CI_COMMIT_TAG"
    - apk add --no-cache git curl bash coreutils
    - curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
    - mv kustomize /usr/local/bin/
    - git config --global user.email "gitlab@oe260.iml.fhg.de"
    - git config --global user.name "GitLab CI/CD"
  script:
    - cd ./kustomize/bff/overlays/dev
    - kustomize edit set image ${CRI_PATH}/bff:latest #$CI_COMMIT_TAG
    - cd ../../../../frontend/overlays/dev
    - kustomize edit set image ${CRI_PATH}/frontend:latest #$CI_COMMIT_TAG
    - git commit -am '[skip ci] manifest-image update'
    - git push origin main
  only:
    - tags
  except:
    - branches

