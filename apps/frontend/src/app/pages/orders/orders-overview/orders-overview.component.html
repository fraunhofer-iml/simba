<div class="overview-container">
  <h1>Orders</h1>

  <div class="searchbar-container card">
    <mat-form-field class="searchbar">
      <img matIconPrefix src="assets/icons/search.svg" alt="Icon" />
      <input matInput (keyup)="applyFilter($event)" #input />
    </mat-form-field>

    <button mat-flat-button class="create-button" routerLink="{{ ROUTING.newOrders }}">Create Order</button>
  </div>
  <div class="table-container card">
    <table mat-table *ngIf="dataSourceObservable | async as source" [dataSource]="source" matSort>
      <ng-container matColumnDef="orderId">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">OrderId</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">Date</th>
        <td mat-cell *matCellDef="let row">{{ row.creationDate }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">Status</th>
        <td mat-cell *matCellDef="let row">{{ row.status }}</td>
      </ng-container>
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">Price</th>
        <td mat-cell *matCellDef="let row">{{ row.price }}</td>
      </ng-container>
      <ng-container matColumnDef="products">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">Products</th>
        <td mat-cell *matCellDef="let row">{{ row.product.name }}</td>
      </ng-container>
      <ng-container matColumnDef="robots">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">Robots</th>
        <td mat-cell *matCellDef="let row">{{ row.robots }}</td>
      </ng-container>
      <ng-container matColumnDef="customerID">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bold">CustomerID</th>
        <td mat-cell *matCellDef="let row">{{ row.customerId }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter "{{ input.value }}"</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
  </div>
</div>
