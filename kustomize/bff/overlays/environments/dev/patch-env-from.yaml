apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
spec:
  template:
    spec:
      containers:
        - name: bff
          image: nexus.blockchain-europe.iml.fraunhofer.de:5001/bff:latest
          envFrom:
            - configMapRef:
                name: envs
            - configMapRef:
                name: shared-envs
